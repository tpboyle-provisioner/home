---
- name: "scanner : Check if brscan5 is installed"
  shell: dpkg -l | grep '^ii' | grep brscan5
  register: dpkg_check
  ignore_errors: yes

- name: "scanner : Download brscan5 .deb if not installed"
  get_url:
    url: https://download.brother.com/welcome/dlf104033/brscan5-1.3.10-5.amd64.deb
    dest: /tmp/brscan5-1.3.10-5.amd64.deb
  when: dpkg_check.rc != 0

- name: "scanner : Install brscan5 .deb"
  apt:
    deb: /tmp/brscan5-1.3.10-5.amd64.deb
    state: present
  when: dpkg_check.rc != 0

- name: "scanner : Install scanning utilities"
  apt:
    name: gscan2pdf
